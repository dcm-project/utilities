# KubeVirt Service Provider
# Requires: OCP cluster with OpenShift Virtualization (CNV) installed

PROVIDER_LABEL="kubevirt"
PROVIDER_FLAG="kubevirt-service-provider"
PROVIDER_DESCRIPTION="Enable the kubevirt service provider (requires OCP + CNV)"

# Compose integration — profile defined in api-gateway compose.yaml
COMPOSE_PROFILE="kubevirt"
COMPOSE_OVERRIDE=""

# CLI — requires oc specifically (CNV CRD checks use oc)
CLI_REQUIREMENT="oc"

# Namespace configuration
NAMESPACE_FLAG="kubevirt-vm-namespace"
NAMESPACE_ENV="KUBEVIRT_VM_NAMESPACE"
NAMESPACE_DEFAULT="vms"

# Env vars exported for compose.yaml substitution
KUBECONFIG_EXPORT="KUBEVIRT_KUBECONFIG"
NAMESPACE_EXPORT="KUBEVIRT_NAMESPACE"

# Validation function (defined in deploy-dcm.sh)
VALIDATE_HOOK="validate_kubevirt_provider"
