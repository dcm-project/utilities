# Kubernetes Container Service Provider
# Works with any Kubernetes cluster (OCP or upstream)

PROVIDER_LABEL="k8s-container"
PROVIDER_FLAG="k8s-container-service-provider"
PROVIDER_DESCRIPTION="Enable the k8s container service provider"

# Compose integration — profile defined in api-gateway compose.yaml;
# override publishes the SP port to the host for direct API access.
COMPOSE_PROFILE="k8s-container"
COMPOSE_OVERRIDE="tests/compose-sp-test.yaml"

# CLI — accepts oc or kubectl (prefers oc)
CLI_REQUIREMENT="oc-or-kubectl"

# Namespace configuration
NAMESPACE_FLAG="k8s-container-namespace"
NAMESPACE_ENV="K8S_CONTAINER_SP_NAMESPACE"
NAMESPACE_DEFAULT="default"

# Env vars exported for compose.yaml substitution
KUBECONFIG_EXPORT="K8S_CONTAINER_SP_KUBECONFIG"
NAMESPACE_EXPORT="K8S_CONTAINER_SP_NAMESPACE"

# Validation function (defined in deploy-dcm.sh)
VALIDATE_HOOK="validate_k8s_container_provider"
