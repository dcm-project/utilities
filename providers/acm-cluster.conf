# ACM Cluster Service Provider
# Requires: OCP cluster with ACM or MCE installed
# Use --deploy-acm or --deploy-mce to install ACM/MCE as part of deployment

PROVIDER_LABEL="acm-cluster"
PROVIDER_FLAG="acm-cluster-service-provider"
PROVIDER_DESCRIPTION="Enable the ACM cluster service provider (requires OCP + ACM/MCE)"

# Compose integration — profile defined in api-gateway compose.yaml;
# override publishes the SP port to the host for direct API access.
COMPOSE_PROFILE="acm-cluster"
COMPOSE_OVERRIDE="tests/compose-acm-cluster-sp.yaml"

# CLI — requires oc specifically
CLI_REQUIREMENT="oc"

# Namespace configuration
NAMESPACE_FLAG="acm-cluster-namespace"
NAMESPACE_ENV="ACM_CLUSTER_SP_NAMESPACE"
NAMESPACE_DEFAULT="clusters"

# Env vars exported for compose override substitution
KUBECONFIG_EXPORT="ACM_CLUSTER_SP_KUBECONFIG"
NAMESPACE_EXPORT="ACM_CLUSTER_SP_NAMESPACE"

# Validation function (defined in deploy-dcm.sh)
VALIDATE_HOOK="validate_acm_cluster_provider"
