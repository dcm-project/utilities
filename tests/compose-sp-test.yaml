# Compose override for E2E testing: publishes service provider ports to host.
# Applied automatically by run-e2e.sh when SP profiles are active.
#
# Usage with deploy-dcm.sh:
#   ./scripts/deploy-dcm.sh --k8s-container-service-provider --compose-file tests/compose-sp-test.yaml

services:
  k8s-container-service-provider:
    ports:
      - "8082:8080"
